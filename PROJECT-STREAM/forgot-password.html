<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Fitness Streams</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="animated-bg"></div>
  <div class="bg-glow"></div>

  <section class="auth-section">
    <div class="auth-card card-3d reveal">

      <h1 class="glow">Forgot Password</h1>
      <p class="auth-sub">Enter your email and we will send a reset link.</p>

      <form id="forgotForm">
        <input id="email" type="email" placeholder="Enter your email" required />
        <button class="btn auth-btn" type="submit">Send Reset Link</button>
      </form>

      <p class="auth-bottom" style="margin-top:18px;">
        Back to <a class="glow-link" href="login.html">Login</a>
      </p>

    </div>
  </section>

  <script src="script.js"></script>

  <script>
    document.getElementById("forgotForm").addEventListener("submit", async function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();

      try {
        const res = await fetch("/.netlify/functions/forgotPassword", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if(!res.ok){
          alert("❌ " + data.message);
          return;
        }

        alert("✅ Reset link sent to your email!");
      } catch(err){
        alert("❌ Server error. Try again.");
        console.log(err);
      }
    });
  </script>

</body>
</html>
