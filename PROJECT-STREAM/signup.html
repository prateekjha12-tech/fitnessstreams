<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - Fitness Streams</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="animated-bg"></div>
  <div class="bg-glow"></div>

  <section class="auth-section">
    <div class="auth-card card-3d reveal">

      <h1 class="glow">Create Account</h1>
      <p class="auth-sub">Join Fitness Streams and start tracking progress.</p>

      <form id="signupForm">
        <input id="name" type="text" placeholder="Full Name" required />
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password (min 6 chars)" required />

        <button class="btn auth-btn" type="submit">Sign Up</button>
      </form>

      <p class="auth-bottom">
        Already have an account?
        <a class="glow-link" href="login.html">Login</a>
      </p>

    </div>
  </section>

  <script src="script.js"></script>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      if (password.length < 6) {
        alert("⚠️ Password must be at least 6 characters.");
        return;
      }

      try {
        const res = await fetch("/.netlify/functions/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          alert("❌ " + data.message);
          return;
        }

        alert("✅ Signup successful! Now login.");
        window.location.href = "login.html";

      } catch (err) {
        alert("❌ Server Error. Try again.");
        console.log(err);
      }
    });
  </script>

</body>
</html>
</section>

<script src="script.js"></script>
<script src="auth.js"></script>

</body>
</html>
