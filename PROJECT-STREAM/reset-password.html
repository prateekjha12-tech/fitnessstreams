<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Fitness Streams</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="animated-bg"></div>
  <div class="bg-glow"></div>

  <section class="auth-section">
    <div class="auth-card card-3d reveal">

      <h1 class="glow">Reset Password</h1>
      <p class="auth-sub">Enter your new password.</p>

      <form id="resetForm">
        <input id="newPassword" type="password" placeholder="New Password (min 6 chars)" required />
        <button class="btn auth-btn" type="submit">Reset Password</button>
      </form>

      <p class="auth-bottom" style="margin-top:18px;">
        Back to <a class="glow-link" href="login.html">Login</a>
      </p>

    </div>
  </section>

  <script src="script.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      alert("❌ Invalid reset link.");
      window.location.href = "login.html";
    }

    document.getElementById("resetForm").addEventListener("submit", async function(e){
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value.trim();

      if (newPassword.length < 6) {
        alert("⚠️ Password must be at least 6 characters.");
        return;
      }

      try {
        const res = await fetch("/.netlify/functions/resetPassword", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          alert("❌ " + data.message);
          return;
        }

        alert("✅ Password reset successful! Now login.");
        window.location.href = "login.html";

      } catch(err) {
        alert("❌ Server error.");
        console.log(err);
      }
    });
  </script>

</body>
</html>
